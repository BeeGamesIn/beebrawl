<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bee Brawl: Trophy Road</title>
<link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1Xy_Y-47_7U3-04z8G2H9lP4vLg5C8A7f">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{margin:0;overflow:hidden;background:#1a3317;font-family:sans-serif;user-select:none;touch-action:none;color:#fff}
canvas{display:block}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.menu-card{background:#222;padding:20px;border-radius:20px;border:3px solid #fc0;width:85%;max-width:380px;display:flex;flex-direction:column;text-align:center;max-height:90vh}
button{padding:12px;font-size:16px;background:#4CAF50;color:#fff;border:2px solid #fff;border-radius:12px;cursor:pointer;margin:4px 0;width:100%;font-weight:bold}
button:disabled{opacity:.4}.exit-btn{background:#f44!important}
.stats-bar{position:absolute;top:10px;left:10px;font-size:16px;color:#fc0;z-index:110;text-shadow:1px 1px #000}
.road-btn{background:#e67e22!important;border-color:#fff!important}
#ui{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;display:none;text-align:center}
.road-item{background:#333;margin:5px 0;padding:10px;border-radius:12px;display:flex;justify-content:space-between;align-items:center}
.game-logo{width:100px;height:100px;border-radius:20px;border:3px solid #fc0;margin-bottom:10px}
</style></head><body>

<div class="stats-bar">💰 <span id="coinCount">0</span> | 🏆 <span id="trophyCount">0</span></div>

<div id="mainMenu" class="overlay">
    <img src="https://lh3.googleusercontent.com/d/1Xy_Y-47_7U3-04z8G2H9lP4vLg5C8A7f" class="game-logo">
    <h1 style="color:#fc0;margin:0;">BEE BRAWL</h1>
    <div style="width:240px">
        <button onclick="showMenu('modeMenu')">В БОЙ!</button>
        <button class="road-btn" onclick="showMenu('roadMenu')">🏆 ПУТЬ НАГРАД</button>
        <button onclick="showMenu('hiveMenu')">🐝 УЛЕЙ</button>
        <button style="background:#666" onclick="showMenu('settingsMenu')">⚙️</button>
    </div>
</div>

<div id="roadMenu" class="overlay" style="display:none">
    <div class="menu-card">
        <h2 style="color:#fc0">ПУТЬ К НАГРАДАМ</h2>
        <div id="roadList" style="overflow-y:auto; flex-grow:1; margin-bottom:10px"></div>
        <button class="exit-btn" onclick="showMenu('mainMenu')">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="settingsMenu" class="overlay" style="display:none"><div class="menu-card"><h2>НАСТРОЙКИ</h2><input type="text" id="nickInput" style="padding:10px;border-radius:10px;text-align:center"><button onclick="updateNick()">ОК</button><button class="exit-btn" onclick="showMenu('mainMenu')">НАЗАД</button></div></div>
<div id="hiveMenu" class="overlay" style="display:none"><div class="menu-card"><h2>УЛЕЙ</h2><div id="shopList"></div><button class="exit-btn" onclick="showMenu('mainMenu')">НАЗАД</button></div></div>
<div id="modeMenu" class="overlay" style="display:none"><div class="menu-card"><h2>РЕЖИМЫ</h2><button onclick="startGame('gems')">💎 КРИСТАЛЛЫ</button><button onclick="startGame('arena')">⚔️ АРЕНА</button><button class="exit-btn" onclick="showMenu('mainMenu')">НАЗАД</button></div></div>
<div id="resultScreen" class="overlay" style="display:none"><div class="menu-card"><h1 id="resTitle"></h1><p id="resReward"></p><p id="resTrophies" style="color:#3498db"></p><button onclick="showMenu('mainMenu')">В МЕНЮ</button></div></div>

<div id="ui"><h2 id="scoreText">0 : 0</h2></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;

// D - Данные игрока. clR - список забранных наград на пути.
let D=JSON.parse(localStorage.getItem('bbV_Road'))||{coins:0,trophies:0,unlocked:['bee'],selected:'bee',clR:[],nick:'Player1',clS:0,clHeart:0};

function save(){
    localStorage.setItem('bbV_Road',JSON.stringify(D));
    document.getElementById('coinCount').innerText=D.coins;
    document.getElementById('trophyCount').innerText=D.trophies;
}

function showMenu(id){
    document.querySelectorAll('.overlay').forEach(m=>m.style.display='none');
    document.getElementById(id).style.display='flex';
    if(id==='roadMenu')upRoad();
    if(id==='hiveMenu')upS();
}

function upRoad(){
    let h = '';
    // Генерируем награды до 600 кубков (с шагом 50)
    for(let t=50; t<=550; t+=50){
        let isCl = D.clR.includes(t);
        let canCl = D.trophies >= t && !isCl;
        let rewardText = "";
        
        if(t === 500) {
            rewardText = "❤️🐝 СКИН";
            if(D.clHeart) isCl = true;
        } else {
            rewardText = (t <= 250 ? "35" : "25") + " 💰";
        }

        h += `<div class="road-item">
            <span style="font-weight:bold; color:${D.trophies>=t?'#fc0':'#777'}">${t} 🏆</span>
            <span>${rewardText}</span>
            <button style="width:80px; font-size:10px; background:${isCl?'#444':(canCl?'#4CAF50':'#777')}" 
                ${!canCl?'disabled':''} onclick="claimRoad(${t})">
                ${isCl?'ВЗЯТО':(canCl?'ЗАБРАТЬ':'ЗАБЛОК')}
            </button>
        </div>`;
    }
    document.getElementById('roadList').innerHTML = h;
}

function claimRoad(t){
    if(t === 500) {
        D.clHeart = 1;
    } else {
        D.coins += (t <= 250 ? 35 : 25);
    }
    D.clR.push(t);
    save();
    upRoad();
}

// Изменяем отрисовку пчелы, если выбран скин "Сердечко"
const C={'bee':{e:'🐝',h:160,s:2.3,r:1200,n:'Bee'}}; // Упрощено для примера

function endG(w){
    active=0;
    let cW = w ? 150 : 40;
    let tW = w ? Math.floor(Math.random()*3)+6 : 0;
    D.coins += cW; D.trophies += tW;
    save();
    document.getElementById('resTitle').innerText = w ? "ПОБЕДА!" : "ПОРАЖЕНИЕ";
    document.getElementById('resReward').innerText = `+${cW} монет`;
    document.getElementById('resTrophies').innerText = `+${tW} кубков`;
    document.getElementById('ui').style.display='none';
    document.getElementById('resultScreen').style.display='flex';
}

// ... Логика игры (F класс, loop, controls) такая же, как в прошлых версиях ...
// При отрисовке Пчелы в классе F:
// ctx.fillText((this.cl.n==='Bee' && D.clHeart)?'❤️🐝':this.cl.e, this.x, dy);

function updateNick(){let n=document.getElementById('nickInput').value; if(n){D.nick=n;save()}}
function upS(){let h='';/*...*/ document.getElementById('shopList').innerHTML=h}
function startGame(m){active=1;mode=m;bS=0;rS=0;bullets=[];gems=[];uH=0;webs=[];mTime=Date.now();save();document.querySelectorAll('.overlay').forEach(o=>o.style.display='none');document.getElementById('ui').style.display='block';initL()}
function initL(){obs=[];for(let i=0;i<6;i++)obs.push({x:Math.random()*(canvas.width-200)+100,y:Math.random()*(canvas.height-200)+100,r:35});tB=[new F('blue',100,canvas.height/2,1,D.selected)];tR=[new F('red',canvas.width-100,canvas.height/2)]}
class F{constructor(side,x,y,isP,type){this.side=side;this.isP=isP;this.cl=C[type||'bee'];this.x=x;this.y=y;this.hp=this.cl.h;this.dead=0;this.lS=0;this.g=0;this.j={a:0}}
draw(){if(this.dead)return;ctx.font="40px Arial";
let icon = this.cl.e;
if(this.isP && D.selected === 'bee' && D.clHeart) icon = '❤️🐝';
ctx.fillText(icon,this.x,this.y);}}
// ... (остальной код для стрельбы и движения)
let J={move:{a:0},atk:{a:0},ult:{a:0}};
function loop(){if(!active)return;ctx.fillStyle='#2d5a27';ctx.fillRect(0,0,canvas.width,canvas.height);all=[...tB,...tR];all.forEach(f=>{f.draw()});requestAnimationFrame(loop)}
save();loop();
</script></body></html>
