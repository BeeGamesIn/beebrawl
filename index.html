<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee Brawl Classic</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --purple: #9b59b6; --green: #2ecc71; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Arial Black', sans-serif; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        .header { display: flex; justify-content: center; gap: 8px; padding: 10px; background: #000; border-bottom: 2px solid #333; }
        .box { background: #222; padding: 5px 12px; border-radius: 20px; border: 2px solid #fff; font-size: 14px; }

        .screen { display: none; height: calc(100vh - 60px); flex-direction: column; align-items: center; justify-content: space-between; padding: 15px 10px; box-sizing: border-box; }
        .active { display: flex; }

        #main-sprite { font-size: 100px; margin: 10px 0; }
        .rank-zone { width: 80%; max-width: 300px; }
        .progress-bg { width: 100%; height: 16px; background: #333; border-radius: 8px; border: 2px solid #fff; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.3s; }
        .progress-text { position: absolute; width: 100%; top: 0; font-size: 11px; line-height: 16px; text-shadow: 1px 1px #000; }

        .play-btn { background: var(--gold); border: none; width: 85%; padding: 20px; font-size: 30px; border-radius: 20px; border-bottom: 8px solid #d35400; color: #fff; cursor: pointer; font-family: 'Arial Black', sans-serif; }
        .btn-nav { padding: 12px 5px; font-size: 10px; border-radius: 10px; border: none; color: white; cursor: pointer; width: 30%; font-weight: bold; }

        #battle-arena { width: 95%; height: 350px; background: #27ae60; border: 5px solid #1e8449; border-radius: 25px; position: relative; overflow: hidden; margin: 10px 0; touch-action: none; }
        #bear-target { position: absolute; font-size: 60px; transition: top 0.4s, left 0.4s; z-index: 10; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .projectile { position: absolute; font-size: 20px; z-index: 5; transition: all 0.3s linear; pointer-events: none; }
        
        .item-row { background: #333; padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gold); }
        .ach-btn { background: var(--green); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .card { background: #222; padding: 10px; border-radius: 15px; border: 3px solid transparent; }
        .selected { border-color: var(--gold); background: #333; }
        .locked { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="header">
        <div class="box">🏆 <span id="total-t">0</span></div>
        <div class="box" style="color:var(--gold)">🍯 <span id="coins">0</span></div>
    </div>

    <div id="menu" class="screen active">
        <div></div>
        <div id="main-sprite">🐝</div>
        <div class="rank-zone">
            <span id="cur-rank" style="color:var(--gold)">РАНГ 1</span>
            <div class="progress-bg">
                <div id="rank-fill" class="progress-fill"></div>
                <div class="progress-text"><span id="cur-t">0</span> / 25</div>
            </div>
        </div>
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <button class="play-btn" onclick="startFight()">В БОЙ!</button>
            <div style="display:flex; gap:5px; width:100%; justify-content:center;">
                <button class="btn-nav" style="background:var(--blue)" onclick="changeScreen('hive')">УЛЕЙ</button>
                <button class="btn-nav" id="up-btn" style="background:var(--green);" onclick="changeScreen('upgrades')">СИЛА</button>
                <button class="btn-nav" style="background:var(--purple)" onclick="changeScreen('achievements')">УСПЕХИ</button>
            </div>
        </div>
    </div>

    <div id="upgrades" class="screen">
        <h3>МАГАЗИН СИЛЫ</h3>
        <div style="width:100%">
            <div class="item-row"><div><b>Бонус</b></div><button class="ach-btn" onclick="buyUpgrade('bonus')"><span id="b-cost">150</span>🍯</button></div>
            <div class="item-row"><div><b>Защита</b></div><button class="ach-btn" onclick="buyUpgrade('prot')"><span id="p-cost">200</span>🍯</button></div>
        </div>
        <button class="play-btn" style="font-size:18px; padding:10px; width:150px" onclick="changeScreen('menu')">НАЗАД</button>
    </div>

    <div id="hive" class="screen">
        <h3>ТВОИ ПЧЕЛЫ</h3>
        <div id="hive-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%"></div>
        <button class="play-btn" style="font-size:18px; padding:10px; width:150px" onclick="changeScreen('menu')">НАЗАД</button>
    </div>

    <div id="achievements" class="screen">
        <h3>УСПЕХИ</h3>
        <div id="ach-list" style="width:100%"></div>
        <button class="play-btn" style="font-size:18px; padding:10px; width:150px" onclick="changeScreen('menu')">НАЗАД</button>
    </div>

    <div id="fight" class="screen">
        <h2 id="b-status">ОГОНЬ!</h2>
        <div id="battle-arena" onclick="shoot(event)">
            <div id="player-hero" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:50px; pointer-events:none;">🐝</div>
            <div id="bear-target">🐻</div>
        </div>
        <div class="box">ХП: <span id="p-hp">100</span>%</div>
    </div>

<script>
    const SAVE_KEY = 'BeeBrawl_Universal_Save';
    let coins = 0, totalT = 0, sel = 'bee', up_bonus = 0, up_prot = 0;
    let chars = {
        bee: { em: '🐝', t: 0, open: true, p: 0, proj: '📍' },
        fly: { em: '🪰', t: 0, open: false, p: 250, proj: '🦠' },
        spider: { em: '🕷️', t: 0, open: false, p: 500, proj: '🕸️' },
        mosq: { em: '🦟', t: 0, open: false, p: 800, proj: '💉' },
        grass: { em: '🦗', t: 0, open: false, p: 1200, proj: '🌿' }
    };
    let bHP, pHP, bMove, bTimer, isFreeze = false;

    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ coins, totalT, sel, chars, up_bonus, up_prot }));
    }

    function load() {
        const d = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (d) {
            coins = d.coins || 0; totalT = d.totalT || 0; sel = d.sel || 'bee';
            chars = d.chars || chars; up_bonus = d.up_bonus || 0; up_prot = d.up_prot || 0;
        }
        update();
    }

    function update() {
        const c = chars[sel];
        document.getElementById('total-t').innerText = Math.floor(totalT);
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('main-sprite').innerText = c.em;
        document.getElementById('cur-rank').innerText = "РАНГ " + (Math.floor(c.t/25)+1);
        document.getElementById('cur-t').innerText = Math.floor(c.t%25);
        document.getElementById('rank-fill').style.width = (c.t%25/25*100) + "%";
        document.getElementById('b-cost').innerText = (up_bonus+1)*150;
        document.getElementById('p-cost').innerText = (up_prot+1)*200;
        renderHive(); renderAchs();
    }

    function renderHive() {
        const g = document.getElementById('hive-grid'); g.innerHTML = '';
        for (let id in chars) {
            const c = chars[id];
            g.innerHTML += `<div class="card ${id==sel?'selected':''} ${!c.open?'locked':''}" onclick="${c.open?`selectChar('${id}')`:`buyChar('${id}')`}">
                <div style="font-size:35px">${c.em}</div><small>${c.open ? 'ВЫБРАТЬ' : c.p+'🍯'}</small></div>`;
        }
    }

    function renderAchs() {
        const l = document.getElementById('ach-list'); l.innerHTML = '';
        if(totalT >= 250) l.innerHTML = `<div class="item-row"><div>Опытный пчеловод</div><div style="color:var(--green)">ВЫПОЛНЕНО</div></div>`;
        else l.innerHTML = `<div class="item-row"><div>Собери 250🏆</div><div>В ПРОЦЕССЕ</div></div>`;
    }

    function selectChar(id) { sel = id; save(); update(); }
    function buyChar(id) { if(coins>=chars[id].p){ coins-=chars[id].p; chars[id].open=true; save(); update(); } }
    function buyUpgrade(t) {
        let cost = t=='bonus'?(up_bonus+1)*150:(up_prot+1)*200;
        if(coins>=cost){ coins-=cost; if(t=='bonus')up_bonus++; else up_prot++; save(); update(); }
    }

    function startFight() {
        bHP = 100; pHP = 100; isFreeze = false;
        document.getElementById('p-hp').innerText = pHP;
        document.getElementById('player-hero').innerText = chars[sel].em;
        document.getElementById('b-status').innerText = "БОЙ!";
        changeScreen('fight');
        moveBear();
        bMove = setInterval(moveBear, 1200);
        bTimer = setInterval(() => { if(!isFreeze){ pHP-=20; document.getElementById('p-hp').innerText = pHP; if(pHP<=0) end(false); } }, 5000);
    }

    function moveBear() {
        const b = document.getElementById('bear-target');
        b.style.left = Math.random()*70 + '%'; b.style.top = Math.random()*50 + '%';
    }

    function shoot(e) {
        if(e.target.id == 'battle-arena') {
            const p = document.createElement('div');
            p.className = 'projectile'; p.innerText = chars[sel].proj;
            p.style.left = '50%'; p.style.bottom = '20px';
            document.getElementById('battle-arena').appendChild(p);
            setTimeout(() => {
                p.style.left = e.clientX - (window.innerWidth-300)/2 + 'px'; // Центрирование
                p.style.top = e.clientY - 100 + 'px';
                setTimeout(() => {
                    const br = document.getElementById('bear-target').getBoundingClientRect();
                    if(Math.abs(e.clientX - (br.left+35)) < 50 && Math.abs(e.clientY - (br.top+35)) < 50) {
                        bHP -= 20; if(bHP <= 0) end(true);
                    }
                    p.remove();
                }, 300);
            }, 10);
        }
    }

    function end(win) {
        clearInterval(bMove); clearInterval(bTimer);
        const c = chars[sel];
        let change = 0;

        if(win) {
            // ТВОЯ ЛОГИКА ТРОФЕЕВ
            if (c.t < 100) change = 10;
            else if (c.t < 350) change = 8;
            else change = 6;

            change += (up_bonus * 0.25);
            c.t += change; totalT += change;
            
            if (Math.floor(totalT/50) > Math.floor((totalT-change)/50)) {
                coins += (totalT <= 250 ? 35 : 25);
            }
            document.getElementById('b-status').innerText = "+" + change.toFixed(1) + "🏆";
        } else {
            change = Math.max(0, (c.t < 100 ? 0 : 4) - (up_prot * 0.2));
            c.t = Math.max(0, c.t - change); totalT = Math.max(0, totalT - change);
            document.getElementById('b-status').innerText = "-" + change.toFixed(1) + "🏆";
        }
        save(); setTimeout(() => { update(); changeScreen('menu'); }, 2000);
    }

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    window.onload = load;
</script>
</body>
</html>
