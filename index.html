<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bee Brawl: Crystal Strike</title>
<link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1Xy_Y-47_7U3-04z8G2H9lP4vLg5C8A7f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
body{margin:0;overflow:hidden;background:#1a3317;font-family:sans-serif;user-select:none;touch-action:none;color:#fff}
canvas{display:block}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.menu-card{background:#222;padding:20px;border-radius:20px;border:3px solid #fc0;width:85%;max-width:380px;display:flex;flex-direction:column;text-align:center;max-height:90vh}
#shopList,#rewardList{overflow-y:auto;flex-grow:1;margin:10px 0}
button{padding:12px;font-size:16px;background:#4CAF50;color:#fff;border:2px solid #fff;border-radius:12px;cursor:pointer;margin:4px 0;width:100%;font-weight:bold}
button:disabled{opacity:.4}.exit-btn{background:#f44!important}
.stats-bar{position:absolute;top:10px;left:10px;font-size:16px;color:#fc0;z-index:110;text-shadow:1px 1px #000}
input{padding:10px;border-radius:10px;border:none;margin-bottom:10px;text-align:center;width:80%;align-self:center;font-size:16px}
.shop-item,.reward-item{background:#333;margin-bottom:8px;padding:10px;border-radius:12px;border:1px solid #444}
#ui{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;display:none;text-align:center}
.game-logo{width:120px;height:120px;border-radius:25px;border:3px solid #fc0;margin-bottom:15px;box-shadow: 0 0 20px #fc0;}
</style></head><body>

<div class="stats-bar">💰 <span id="coinCount">0</span></div>

<div id="mainMenu" class="overlay">
    <img src="https://lh3.googleusercontent.com/d/1Xy_Y-47_7U3-04z8G2H9lP4vLg5C8A7f" class="game-logo" alt="BeeBrawl Logo">
    <h1 style="color:#fc0;margin:0 0 20px 0;text-shadow: 2px 2px #000;">BEE BRAWL</h1>
    <div style="width:220px">
        <button onclick="showMenu('modeMenu')">ИГРАТЬ</button>
        <button onclick="showMenu('hiveMenu')">🐝 УЛЕЙ</button>
        <button style="background:#666" onclick="showMenu('settingsMenu')">⚙️ НАСТРОЙКИ</button>
    </div>
</div>

<div id="settingsMenu" class="overlay" style="display:none">
    <div class="menu-card">
        <h2 style="color:#fc0">НАСТРОЙКИ</h2>
        <input type="text" id="nickInput" placeholder="Ваш ник...">
        <button onclick="updateNick()">ИЗМЕНИТЬ НИК</button>
        <button id="musicBtn" onclick="toggleMusic()">МУЗЫКА: ВКЛ</button>
        <button id="optBtn" onclick="toggleOpt()">НИЗКИЙ FPS: ВЫКЛ</button>
        <button class="exit-btn" onclick="showMenu('mainMenu')">НАЗАД</button>
    </div>
</div>

<div id="hiveMenu" class="overlay" style="display:none">
    <div class="menu-card">
        <h2 style="color:#fc0">УЛЕЙ</h2>
        <button style="background:#fa0" onclick="showMenu('rewardMenu')">🎁 НАГРАДЫ</button>
        <div id="shopList"></div>
        <button class="exit-btn" onclick="showMenu('mainMenu')">ВЫХОД</button>
    </div>
</div>

<div id="rewardMenu" class="overlay" style="display:none">
    <div class="menu-card">
        <h2 style="color:#fc0">НАГРАДЫ</h2>
        <div id="rewardList"></div>
        <button onclick="showMenu('hiveMenu')">НАЗАД</button>
    </div>
</div>

<div id="modeMenu" class="overlay" style="display:none">
    <div class="menu-card">
        <h2 style="color:#fc0">РЕЖИМЫ</h2>
        <button onclick="startGame('gems')">💎 КРИСТАЛЛЫ</button>
        <button onclick="startGame('arena')">⚔️ АРЕНА</button>
        <button class="exit-btn" onclick="showMenu('mainMenu')">НАЗАД</button>
    </div>
</div>

<div id="resultScreen" class="overlay" style="display:none">
    <div class="menu-card">
        <h1 id="resTitle"></h1>
        <p id="resReward" style="color:#fc0;font-size:20px"></p>
        <button onclick="showMenu('mainMenu')">В МЕНЮ</button>
    </div>
</div>

<div id="ui">
    <h2 id="modeInfo" style="margin:0;font-size:14px;color:#fc0"></h2>
    <h2 id="scoreText" style="margin:0;font-size:24px;text-shadow:2px 2px #000">0 : 0</h2>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;

let D=JSON.parse(localStorage.getItem('bbV_Full'))||{coins:0,unlocked:['bee'],selected:'bee',kills:0,games:0,clK:0,clS:0,nick:'Player1',music:true,low:false};
const NAMES=["Shadow","Blaze","Storm","Hunter","Ace","Viper","Rogue","Frost","Titan","Bullet"];
const C={'bee':{e:'🐝',h:160,s:2.3,r:1200,t:'sniper',n:'Bee',p:400,ra:'rare'},'fly':{e:'🪰',h:130,s:2.8,r:1000,t:'shotgun',n:'Fly',p:400,ra:'rare'},'mosquito':{e:'🦟',h:110,s:3.5,r:800,t:'sniper',n:'Mosquito',p:800,ra:'super-rare'},'butterfly':{e:'🦋',h:200,s:2.5,r:1300,t:'sniper',n:'Butterfly',p:1500,ra:'epic'},'hopper':{e:'🦗',h:120,s:3.2,r:1500,t:'jumper',n:'Hopper',p:2000,ra:'mythic'},'bumble':{e:'🐝',h:250,s:1.8,r:2000,t:'tank',n:'Bumble',p:2000,ra:'mythic'},'spider':{e:'🕷️',h:180,s:2.4,r:1400,t:'spider',n:'Spider',p:3500,ra:'legend'}};

let active=0,mode='arena',bS=0,rS=0,uH=0,bullets=[],obs=[],tB=[],tR=[],gems=[],webs=[],mTime=0,audioCtx=null,J={move:{a:0,sx:0,sy:0,cx:0,cy:0,id:null},atk:{a:0,sx:0,sy:0,cx:0,cy:0,id:null,ang:0},ult:{a:0,sx:0,sy:0,cx:0,cy:0,id:null,ang:0}};

function save(){localStorage.setItem('bbV_Full',JSON.stringify(D));document.getElementById('coinCount').innerText=D.coins;document.getElementById('nickInput').value=D.nick}
function showMenu(id){document.querySelectorAll('.overlay').forEach(m=>m.style.display='none');document.getElementById(id).style.display='flex';if(id==='hiveMenu')upS();if(id==='rewardMenu')upR();if(D.music)startAudio()}
function updateNick(){let n=document.getElementById('nickInput').value;if(n){D.nick=n;save();alert("Ник сохранен!")}}
function toggleMusic(){D.music=!D.music;document.getElementById('musicBtn').innerText=`МУЗЫКА: ${D.music?'ВКЛ':'ВЫКЛ'}`;if(!D.music&&audioCtx)audioCtx.close();save()}
function toggleOpt(){D.low=!D.low;document.getElementById('optBtn').innerText=`НИЗКИЙ FPS: ${D.low?'ВКЛ':'ВЫКЛ'}`;save()}

function startAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(150,audioCtx.currentTime);g.gain.setValueAtTime(0.01,audioCtx.currentTime);o.connect(g);g.connect(audioCtx.destination);o.start();setInterval(()=>{if(active)o.frequency.exponentialRampToValueAtTime(Math.random()*50+120,audioCtx.currentTime+0.5)},600)}

function upS(){let h='';for(let k in C){let i=C[k],o=D.unlocked.includes(k),s=D.selected===k,e=(k==='bee'&&D.clS)?'🌷🐝':i.e;h+=`<div class="shop-item"><span>${e} ${i.n}</span><br>${o?`<button onclick="sel('${k}')" ${s?'disabled':''}>${s?'ВЫБРАНО':'ВЫБРАТЬ'}</button>`:`<button style="background:#555" onclick="buy('${k}',${i.p})">КУПИТЬ ${i.p}</button>`}</div>`}document.getElementById('shopList').innerHTML=h}
function upR(){document.getElementById('rewardList').innerHTML=`<div class="reward-item"><p>🎯 50 киллов (${D.kills}/50)</p><button ${D.kills<50||D.clK?'disabled':''} onclick="clR('k')">${D.clK?'ПОЛУЧЕНО':'100 💰'}</button></div><div class="reward-item"><p>🐝 20 игр (${D.games}/20)</p><button ${D.games<20||D.clS?'disabled':''} onclick="clR('s')">${D.clS?'УЖЕ ЕСТЬ':'СКИН 🌷'}</button></div>`}
function clR(t){if(t==='k'){D.coins+=100;D.clK=1}else{D.clS=1}save();upR()}
function buy(k,p){if(D.coins>=p){D.coins-=p;D.unlocked.push(k);save();upS()}}
function sel(k){D.selected=k;save();upS()}
function inO(x,y){return obs.some(o=>Math.hypot(x-o.x,y-o.y)<o.r+20)}

class F{constructor(side,x,y,isP,type){this.side=side;this.isP=isP;this.nick=isP?D.nick:NAMES[Math.floor(Math.random()*NAMES.length)];this.cl=C[type||Object.keys(C)[Math.floor(Math.random()*7)]];this.x=x;this.y=y;this.hp=this.cl.h;this.dead=0;this.lS=0;this.g=0;this.j={a:0,t:0,sx:0,sy:0,tx:0,ty:0};this.safe()}
safe(){let a=0;while(inO(this.x,this.y)&&a<50){this.x=this.side==='blue'?80+Math.random()*150:canvas.width-80-Math.random()*150;this.y=50+Math.random()*(canvas.height-100);a++}}
draw(){if(this.dead)return;let dy=this.y;if(this.j.a){let p=(Date.now()-this.j.t)/600;if(p>=1)this.j.a=0;else{this.x=this.j.sx+(this.j.tx-this.j.sx)*p;this.y=this.j.sy+(this.j.ty-this.j.sy)*p;dy-=Math.sin(p*Math.PI)*100}}ctx.textAlign="center";ctx.fillStyle=this.side==='blue'?'#0cf':'#f44';ctx.font="bold 12px Arial";ctx.fillText(this.nick,this.x,dy-50);ctx.font="40px sans-serif";ctx.fillText((this.cl.n==='Bee'&&D.clS)?'🌷🐝':this.cl.e,this.x,dy);ctx.fillStyle='#000';ctx.fillRect(this.x-20,dy-42,40,5);ctx.fillStyle=this.side==='blue'?'#0f0':'#f00';ctx.fillRect(this.x-20,dy-42,Math.max(0,(this.hp/this.cl.h)*40),5)}
shoot(a,u=0){if(this.dead||this.j.a||Date.now()-this.lS<(u?0:this.cl.r))return;this.lS=Date.now();if(u){if(this.cl.t==='spider')webs.push({x:this.x+Math.cos(a)*150,y:this.y+Math.sin(a)*150,t:Date.now()+8000});else bullets.push({x:this.x,y:this.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,side:this.side,e:'🔥',d:120,u:1})}else{let be=(this.cl.n==='Mosquito')?'💉':(this.cl.t==='spider')?'🕸️':'📍';if(this.cl.t==='shotgun'){for(let i=-.3;i<=.3;i+=.3)bullets.push({x:this.x,y:this.y,vx:Math.cos(a+i)*8,vy:Math.sin(a+i)*8,side:this.side,e:'🦠',d:12})}else if(this.cl.t==='jumper'){let tx=Math.max(50,Math.min(canvas.width-50,this.x+Math.cos(a)*220)),ty=Math.max(50,Math.min(canvas.height-50,this.y+Math.sin(a)*220));if(!inO(tx,ty))this.j={a:1,t:Date.now(),sx:this.x,sy:this.y,tx:tx,ty:ty}}else bullets.push({x:this.x,y:this.y,vx:Math.cos(a)*9,vy:Math.sin(a)*9,side:this.side,e:be,d:35})}}
die(){this.dead=1;if(this.side==='red'){D.kills++;save()}if(mode==='arena'){if(this.side==='blue')rS++;else bS++;}upScore();setTimeout(()=>{if(active){this.dead=0;this.hp=this.cl.h;this.safe()}},3500)}}

function startGame(m){active=1;mode=m;bS=0;rS=0;bullets=[];gems=[];uH=0;webs=[];mTime=Date.now();D.games++;save();document.querySelectorAll('.overlay').forEach(o=>o.style.display='none');document.getElementById('ui').style.display='block';document.getElementById('modeInfo').innerText=m==='gems'?"GEMS":"ARENA";upScore();initL()}
function initL(){obs=[];for(let i=0;i<6;i++){let ox=Math.random()*(canvas.width-300)+150,oy=Math.random()*(canvas.height-200)+100;if(mode==='gems'&&Math.hypot(ox-canvas.width/2,oy-canvas.height/2)<100)continue;obs.push({x:ox,y:oy,r:40})}tB=[new F('blue',100,canvas.height/2,1,D.selected),new F('blue',100,100),new F('blue',100,canvas.height-100)];tR=[new F('red',canvas.width-100,canvas.height/2),new F('red',canvas.width-100,100),new F('red',canvas.width-100,canvas.height-100)]}
function upScore(){document.getElementById('scoreText').innerHTML=`<span style="color:#0cf">${bS}</span> : <span style="color:#f44">${rS}</span>`}
function endG(w){active=0;let r=w?150:40;D.coins+=r;save();const t=document.getElementById('resTitle');t.innerText=w?"WINNER!":"DEFEAT";t.className=w?"win-text":"lose-text";document.getElementById('resReward').innerText=`+${r} Bicoins`;document.getElementById('ui').style.display='none';document.getElementById('resultScreen').style.display='flex'}

canvas.addEventListener('touchstart',e=>{if(!active)return;for(let t of e.changedTouches){let x=t.clientX,y=t.clientY;if(x<canvas.width/2)J.move={a:1,sx:x,sy:y,cx:x,cy:y,id:t.identifier};else{if(uH>=10&&y<canvas.height/2)J.ult={a:1,sx:x,sy:y,cx:x,cy:y,id:t.identifier,ang:0};else J.atk={a:1,sx:x,sy:y,cx:x,cy:y,id:t.identifier,ang:0}}}});
canvas.addEventListener('touchmove',e=>{for(let t of e.changedTouches){let j=Object.values(J).find(v=>v.id===t.identifier);if(j){j.cx=t.clientX;j.cy=t.clientY;j.ang=Math.atan2(t.clientY-j.sy,t.clientX-j.sx)}}e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(J.atk.id===t.identifier){if(Math.hypot(J.atk.cx-J.atk.sx,J.atk.cy-J.atk.sy)>10)tB[0].shoot(J.atk.ang);J.atk.a=0;J.atk.id=null}if(J.ult.id===t.identifier){if(Math.hypot(J.ult.cx-J.ult.sx,J.ult.cy-J.ult.sy)>10){tB[0].shoot(J.ult.ang,1);uH=0}J.ult.a=0;J.ult.id=null}if(J.move.id===t.identifier)J.move.a=0}});

function loop(){if(!active){requestAnimationFrame(loop);return}ctx.fillStyle='#2d5a27';ctx.fillRect(0,0,canvas.width,canvas.height);
webs=webs.filter(w=>w.t>Date.now());webs.forEach(w=>{ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.beginPath();for(let i=0;i<8;i++){ctx.moveTo(w.x,w.y);ctx.lineTo(w.x+Math.cos(i)*60,w.y+Math.sin(i)*60)}ctx.stroke()});
if(mode==='gems'){ctx.fillStyle="#444";ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,35,0,7);ctx.fill();if(Date.now()-mTime>7000){gems.push({x:canvas.width/2,y:canvas.height/2});mTime=Date.now()}}
obs.forEach(o=>ctx.fillText('🪨',o.x,o.y));
gems.forEach((g,i)=>{ctx.fillText("💎",g.x,g.y);[...tB,...tR].forEach(f=>{if(!f.dead&&Math.hypot(f.x-g.x,f.y-g.y)<40){f.g++;gems.splice(i,1);if(mode==='gems'){bS=tB.reduce((a,b)=>a+b.g,0);rS=tR.reduce((a,b)=>a+b.g,0);upScore()}}})});
const all=[...tB,...tR];all.forEach(f=>{if(!f.dead&&f.hp<=0)f.die();if(!f.dead){let sp=f.cl.s;if(webs.some(w=>Math.hypot(f.x-w.x,f.y-w.y)<70))sp/=3;if(!f.isP&&!f.j.a){let tar=(f.side==='blue'?tR:tB).filter(e=>!e.dead).sort((a,b)=>Math.hypot(f.x-a.x,f.y-a.y)-Math.hypot(f.x-b.x,f.y-b.y))[0];if(tar){let a=Math.atan2(tar.y-f.y,tar.x-f.x),px=0,py=0;if(!D.low){all.forEach(o=>{if(o!==f&&!o.dead){let d=Math.hypot(f.x-o.x,f.y-o.y);if(d<50){px+=(f.x-o.x)*0.05;py+=(f.y-o.y)*0.05}}})}let nx=f.x+Math.cos(a)*sp+px,ny=f.y+Math.sin(a)*sp+py;if(!inO(nx,ny)){f.x=nx;f.y=ny}if(Date.now()-f.lS>f.cl.r)f.shoot(a)}}else if(f.isP&&J.move.a&&!f.j.a){let dx=J.move.cx-J.move.sx,dy=J.move.cy-J.move.sy,d=Math.hypot(dx,dy);if(d>5){let nx=f.x+(dx/d)*sp,ny=f.y+(dy/d)*sp;if(!inO(nx,ny)){f.x=nx;f.y=ny}}}}f.draw()});
bullets.forEach((b,i)=>{b.x+=b.vx;b.y+=b.vy;ctx.font=b.u?"40px Arial":"20px Arial";ctx.fillText(b.e,b.x,b.y);if(inO(b.x,b.y)){bullets.splice(i,1);return}(b.side==='blue'?tR:tB).forEach(v=>{if(!v.dead&&Math.hypot(b.x-v.x,b.y-v.y)<35){v.hp-=b.d;if(b.side==='blue'&&!b.u)uH=Math.min(10,uH+1.2);bullets.splice(i,1)}})});
if(mode==='gems'&&(bS>=10||rS>=10))endG(bS>=10);if(mode==='arena'&&(bS>=5||rS>=5))endG(bS>=5);
ctx.globalAlpha=0.4;if(J.move.a){ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(J.move.sx,J.move.sy,45,0,7);ctx.fill();ctx.beginPath();ctx.arc(J.move.cx,J.move.cy,20,0,7);ctx.fill()}
if(J.atk.a){ctx.fillStyle="#f00";ctx.beginPath();ctx.arc(J.atk.sx,J.atk.sy,45,0,7);ctx.fill();ctx.beginPath();ctx.arc(J.atk.cx,J.atk.cy,20,0,7);ctx.fill()}
if(uH>=10){ctx.fillStyle="orange";if(J.ult.a){ctx.beginPath();ctx.arc(J.ult.sx,J.ult.sy,55,0,7);ctx.fill();ctx.fillStyle="#ff0";ctx.beginPath();ctx.arc(J.ult.cx,J.ult.cy,25,0,7);ctx.fill()}else{ctx.beginPath();ctx.arc(canvas.width-70,140,40,0,7);ctx.fill();ctx.fillStyle="#fff";ctx.font="18px Arial";ctx.fillText("ULT",canvas.width-70,146)}}
ctx.globalAlpha=1;requestAnimationFrame(loop)}
save();loop();</script></body></html>
